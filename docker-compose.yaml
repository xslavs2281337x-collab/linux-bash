name: test-lab


services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./html/:/usr/share/nginx/html/:ro
    restart: unless-stopped
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app", "-d", "appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: unless-stopped
volumes:
  pgdata:
      
  